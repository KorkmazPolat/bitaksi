<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IK Bilgi Asistani</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d1d5db;
      --primary: #2563eb;
      --primary-strong: #1d4ed8;
      --soft: #eff6ff;
      --radius: 12px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      height: 60px;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      z-index: 20;
    }

    .title { font-weight: 700; font-size: 16px; }
    .subtitle { font-size: 12px; color: var(--muted); }
    .spacer { flex: 1; }

    .btn, .link-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      font-family: inherit;
    }

    .btn.primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .btn.primary:hover { background: var(--primary-strong); }

    .app {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 0;
      transition: grid-template-columns 320ms cubic-bezier(.2,.8,.2,1);
    }

    .app.drawer-open {
      grid-template-columns: minmax(0, 1fr) minmax(360px, 46vw);
    }

    .layout {
      height: 100%;
      min-height: 0;
      padding: 14px;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .card {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 78%;
      padding: 10px 12px;
      border-radius: 10px;
      line-height: 1.5;
      border: 1px solid var(--line);
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .msg.bot { align-self: flex-start; background: #fff; }

    .msg-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      border: 1px solid var(--line);
    }

    .status-pill.answer {
      background: #ecfdf5;
      border-color: #a7f3d0;
      color: #047857;
    }

    .status-pill.abstain {
      background: #fff7ed;
      border-color: #fdba74;
      color: #c2410c;
    }

    .status-pill.clarify {
      background: #fffbeb;
      border-color: #fcd34d;
      color: #b45309;
    }

    .sources {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .sources-block {
      margin-top: 10px;
    }

    .sources-label {
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .src-chip {
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--primary-strong);
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      cursor: pointer;
    }

    .inline-cite {
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 6px;
      padding: 1px 6px;
      font-size: 12px;
      cursor: pointer;
      margin: 0 2px;
    }

    .input-row {
      border-top: 1px solid var(--line);
      padding: 12px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    textarea {
      width: 100%;
      min-height: 42px;
      max-height: 140px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font-family: inherit;
      font-size: 14px;
    }

    #toast {
      position: fixed;
      bottom: 14px;
      right: 14px;
      background: #111827;
      color: #fff;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      display: none;
      max-width: 460px;
      z-index: 1200;
    }

    .drawer {
      height: 100%;
      width: 100%;
      background: #fff;
      min-width: 0;
      border-left: 1px solid var(--line);
      box-shadow: -10px 0 30px rgba(0,0,0,0.12);
      transform: translateX(102%);
      transition: transform 320ms cubic-bezier(.2,.8,.2,1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .drawer.open { transform: translateX(0); }

    .drawer-header {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-height: 56px;
    }

    .drawer-title { font-size: 13px; font-weight: 700; }
    .drawer-sub { font-size: 12px; color: var(--muted); }

    .drawer-body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 12px;
      background: #f8fafc;
    }

    .pdf-wrap {
      position: relative;
      width: 100%;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      overflow: hidden;
    }

    #pdfCanvas {
      display: block;
      width: 100%;
      height: auto;
    }

    #textLayer {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      overflow: hidden;
      line-height: 1;
      text-size-adjust: none;
      transform-origin: 0 0;
    }

    #textLayer span {
      color: transparent;
      position: absolute;
      white-space: pre;
      cursor: text;
      transform-origin: 0% 0%;
      pointer-events: none;
    }

    #textLayer span.matched {
      background: rgba(253, 230, 138, 0.75);
      border-radius: 3px;
      color: transparent;
    }

    .fallback {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 10px;
      font-size: 13px;
      line-height: 1.6;
    }

    .hidden { display: none; }

    @media (max-width: 900px) {
      .msg { max-width: 92%; }
      .app {
        position: relative;
        display: block;
      }
      .app.drawer-open {
        grid-template-columns: none;
      }
      .drawer {
        position: absolute;
        top: 0;
        right: 0;
        width: 100%;
        z-index: 1000;
      }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
  <header>
    <div>
      <div class="title">IK Bilgi Asistani</div>
      <div class="subtitle">Kaynaklara dayali chat</div>
    </div>
    <div class="spacer"></div>
    <a class="link-btn" href="/static/simulation.html">Simulasyon</a>
    <a class="link-btn" href="/static/chunks.html">Chunk Detaylari</a>
    <button class="btn" onclick="document.getElementById('fileInput').click()">Dokuman Yukle</button>
    <input id="fileInput" type="file" accept=".pdf,.doc,.docx" multiple style="display:none" />
  </header>

  <div class="app">
    <main class="layout">
      <section class="card">
        <div id="messages">
          <div class="msg bot">Merhaba. Dokumanlara dayali sorulari yanitlarim, bilgi yetersizse bunu acikca soylerim ve soru muğlaksa once netlestiririm.</div>
        </div>
        <div class="input-row">
          <textarea id="query" placeholder="Sorunuzu yazin..."></textarea>
          <button id="sendBtn" class="btn primary" onclick="sendMessage()">Gonder</button>
        </div>
      </section>
    </main>

    <aside id="pdfDrawer" class="drawer" aria-hidden="true">
      <div class="drawer-header">
        <div>
          <div id="drawerTitle" class="drawer-title">Dokuman Gosterimi</div>
          <div id="drawerSub" class="drawer-sub">Kaynak seciniz</div>
        </div>
        <div class="spacer"></div>
        <button class="btn" onclick="closeDrawer()">Kapat</button>
      </div>

      <div class="drawer-body">
        <div class="pdf-wrap" id="pdfWrap">
          <canvas id="pdfCanvas"></canvas>
          <div id="textLayer"></div>
        </div>

        <div id="fallbackBox" class="fallback hidden"></div>
      </div>
    </aside>
  </div>

  <div id="toast"></div>

  <script>
    const API = "";
    let history = [];
    let lastSources = [];
    let lastCitations = [];
    const chunkPageCache = new Map();

    if (window.pdfjsLib) {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    }

    function showToast(msg) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.style.display = "block";
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => { el.style.display = "none"; }, 3500);
    }

    function escapeHtml(s) {
      return (s || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function openDrawer() {
      const app = document.querySelector(".app");
      const drawer = document.getElementById("pdfDrawer");
      app.classList.add("drawer-open");
      drawer.classList.add("open");
      drawer.setAttribute("aria-hidden", "false");
    }

    function closeDrawer() {
      const app = document.querySelector(".app");
      const drawer = document.getElementById("pdfDrawer");
      drawer.classList.remove("open");
      drawer.setAttribute("aria-hidden", "true");
      app.classList.remove("drawer-open");
    }

    function extractCitedPages(text) {
      const cited = new Set();
      const raw = text || "";
      const re = /\[([^,\]]+),\s*s\.(\d+)\]/g;
      let m;
      while ((m = re.exec(raw)) !== null) {
        const doc = (m[1] || "").trim().toLowerCase();
        const page = Number(m[2] || "1");
        cited.add(`${doc}:${page}`);
      }
      return cited;
    }

    function tokenizeForOverlap(text) {
      return Array.from(new Set(
        ((text || "").toLocaleLowerCase("tr-TR").match(/\p{L}[\p{L}\p{N}]*/gu) || [])
          .filter((token) => token.length >= 3)
      ));
    }

    function overlapScore(a, b) {
      const aTokens = tokenizeForOverlap(a);
      const bTokens = new Set(tokenizeForOverlap(b));
      if (!aTokens.length || !bTokens.size) return 0;
      let overlap = 0;
      aTokens.forEach((token) => {
        if (bTokens.has(token)) overlap += 1;
      });
      return overlap / aTokens.length;
    }

    function extractCitationEntries(text) {
      const raw = text || "";
      const re = /\[([^,\]]+),\s*s\.(\d+)\]/g;
      const entries = [];
      let match;

      while ((match = re.exec(raw)) !== null) {
        const doc = (match[1] || "").trim();
        const page = Number(match[2] || "1");
        const start = match.index;
        const end = re.lastIndex;
        const sentenceStart = Math.max(
          raw.lastIndexOf(".", start - 1),
          raw.lastIndexOf("!", start - 1),
          raw.lastIndexOf("?", start - 1),
          raw.lastIndexOf("\n", start - 1),
        );
        const sentenceEndCandidates = [
          raw.indexOf(".", end),
          raw.indexOf("!", end),
          raw.indexOf("?", end),
          raw.indexOf("\n", end),
        ].filter((idx) => idx !== -1);
        const sentenceEnd = sentenceEndCandidates.length ? Math.min(...sentenceEndCandidates) : raw.length;
        entries.push({
          index: entries.length,
          doc,
          page,
          rawText: match[0],
          context: raw.slice(sentenceStart + 1, sentenceEnd).trim(),
        });
      }

      return entries;
    }

    function buildSourcesBlock(label, items, onClickFactory) {
      const block = document.createElement("div");
      block.className = "sources-block";

      const title = document.createElement("div");
      title.className = "sources-label";
      title.textContent = label;
      block.appendChild(title);

      const row = document.createElement("div");
      row.className = "sources";
      items.forEach((s, i) => {
        const chip = document.createElement("button");
        chip.className = "src-chip";
        chip.textContent = `${s.document} s.${s.page}`;
        chip.onclick = () => onClickFactory(s, i);
        row.appendChild(chip);
      });
      block.appendChild(row);
      return block;
    }

    function formatAnswerType(answerType) {
      if (answerType === "clarify") return "Netlestirme";
      if (answerType === "abstain") return "Dokumanda Yok";
      return "Kaynakli Yanit";
    }

    function addMessage(role, text, sources = [], citations = [], meta = {}) {
      const wrap = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      const citationEntries = role === "bot"
        ? extractCitationEntries(text).map((entry, index) => ({
            ...entry,
            source_index: citations[index]?.source_index ?? -1,
            evidence_text: citations[index]?.evidence_text || "",
            answer_text: cleanAnswerText(entry.context || ""),
          }))
        : [];
      const contentHtml = role === "bot"
        ? renderBotTextWithCitations(text, citationEntries)
        : escapeHtml(text).replace(/\n/g, "<br>");

      if (role === "bot" && meta.answerType) {
        const header = document.createElement("div");
        header.className = "msg-meta";
        const pill = document.createElement("span");
        pill.className = `status-pill ${meta.answerType}`;
        pill.textContent = formatAnswerType(meta.answerType);
        header.appendChild(pill);
        div.appendChild(header);
      }

      const body = document.createElement("div");
      body.innerHTML = contentHtml;
      div.appendChild(body);

      if (sources.length) {
        const citedPages = extractCitedPages(text);
        const primary = [];
        const secondary = [];

        sources.forEach((s, i) => {
          const key = `${String(s.document || "").trim().toLowerCase()}:${Number(s.page) || 1}`;
          if (citedPages.has(key)) {
            primary.push({ ...s, _sourceIndex: i });
          } else {
            secondary.push({ ...s, _sourceIndex: i });
          }
        });

        if (primary.length) {
          div.appendChild(
            buildSourcesBlock("Ana kaynaklar", primary, (s) => showAnswerOnDocument(s._sourceIndex))
          );
        }

        if (secondary.length) {
          div.appendChild(
            buildSourcesBlock("Ek baglam", secondary, (s) => showAnswerOnDocument(s._sourceIndex))
          );
        }
      }

      wrap.appendChild(div);

      if (role === "bot") {
        lastCitations = citationEntries;
        div.querySelectorAll(".inline-cite").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const citationIndex = Number(btn.getAttribute("data-cite-index") || "-1");
            const citation = citationEntries[citationIndex];
            if (!citation) return;
            await showCitationOnDocument(citation, sources);
          });
        });
      }

      wrap.scrollTop = wrap.scrollHeight;
    }

    function cleanAnswerText(text) {
      return (text || "")
        .replace(/\[[^\]]+\]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function uniqueNonEmpty(values) {
      const out = [];
      const seen = new Set();
      (values || []).forEach((value) => {
        const normalized = cleanAnswerText(value);
        if (!normalized) return;
        const key = normalized.toLocaleLowerCase("tr-TR");
        if (seen.has(key)) return;
        seen.add(key);
        out.push(normalized);
      });
      return out;
    }

    function renderBotTextWithCitations(text, citations = []) {
      const raw = text || "";
      const re = /\[([^,\]]+),\s*s\.(\d+)\]/g;
      let out = "";
      let last = 0;
      let m;
      let citationIndex = 0;

      while ((m = re.exec(raw)) !== null) {
        const before = raw.slice(last, m.index);
        const doc = (m[1] || "").trim();
        const page = Number(m[2] || "1");
        const docAttr = encodeURIComponent(doc);
        const citeIndexAttr = citationIndex;

        out += escapeHtml(before).replace(/\n/g, "<br>");
        out += `<button class="inline-cite" data-doc="${docAttr}" data-page="${page}" data-cite-index="${citeIndexAttr}">[${escapeHtml(doc)}, s.${page}]</button>`;
        last = re.lastIndex;
        citationIndex += 1;
      }

      out += escapeHtml(raw.slice(last)).replace(/\n/g, "<br>");
      return out;
    }

    async function sendMessage() {
      const queryEl = document.getElementById("query");
      const sendBtn = document.getElementById("sendBtn");
      const query = queryEl.value.trim();
      if (!query) return;

      addMessage("user", query);
      queryEl.value = "";
      sendBtn.disabled = true;

      try {
        const res = await fetch(`${API}/chat/`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query, history }),
        });

        const data = await res.json();
        const answer = data.answer || "Yanit alinamadi.";
        const sources = data.sources || [];
        const citations = data.citations || [];
        const answerType = data.answer_type || "answer";
        const grounded = Boolean(data.grounded);

        history.push({ role: "user", content: query });
        history.push({ role: "assistant", content: answer });
        if (history.length > 20) history = history.slice(-20);

        lastSources = sources;
        lastCitations = citations;
        addMessage("bot", answer, sources, citations, { answerType, grounded });
        if (answerType === "answer" && sources.length) {
          showAnswerOnDocument(0);
        }
      } catch {
        addMessage("bot", "Sunucuya baglanirken hata olustu.");
      } finally {
        sendBtn.disabled = false;
      }
    }

    function normalizeWithMap(text) {
      let normalized = "";
      const indexMap = [];
      let previousWasSpace = false;

      for (let i = 0; i < (text || "").length; i += 1) {
        const ch = text[i];
        const lower = ch.toLocaleLowerCase("tr-TR");
        if (/[\p{L}\p{N}]/u.test(lower)) {
          normalized += lower;
          indexMap.push(i);
          previousWasSpace = false;
          continue;
        }
        if (/\s/u.test(lower) || /[-_/.,:;!?()[\]{}'""]/u.test(lower)) {
          if (normalized && !previousWasSpace) {
            normalized += " ";
            indexMap.push(i);
          }
          previousWasSpace = true;
          continue;
        }
        if (normalized && !previousWasSpace) {
          normalized += " ";
          indexMap.push(i);
        }
        previousWasSpace = true;
      }

      if (normalized.endsWith(" ")) {
        normalized = normalized.slice(0, -1);
        indexMap.pop();
      }

      return { normalized, indexMap };
    }

    function buildCombinedSpanMap(textLayer) {
      const spans = Array.from(textLayer.querySelectorAll("span"));
      const combinedParts = [];
      const charToSpan = [];
      spans.forEach((sp, spanIndex) => {
        const { normalized } = normalizeWithMap(sp.textContent || "");
        if (!normalized) return;
        for (const ch of normalized) {
          combinedParts.push(ch);
          charToSpan.push(spanIndex);
        }
        combinedParts.push(" ");
        charToSpan.push(spanIndex);
      });

      while (combinedParts.length && combinedParts[combinedParts.length - 1] === " ") {
        combinedParts.pop();
        charToSpan.pop();
      }
      return { spans, combined: combinedParts.join(""), charToSpan };
    }

    function markExactAnswerSpan(textLayer, snippetText) {
      const target = normalizeWithMap(snippetText || "").normalized;
      if (!target) return false;

      const { spans, combined, charToSpan } = buildCombinedSpanMap(textLayer);

      const start = combined.indexOf(target);
      if (start === -1) return false;

      const end = start + target.length - 1;
      const matchedSpanIndexes = new Set();
      for (let i = start; i <= end; i += 1) {
        const spanIndex = charToSpan[i];
        if (spanIndex !== undefined) {
          matchedSpanIndexes.add(spanIndex);
        }
      }

      matchedSpanIndexes.forEach((idx) => spans[idx]?.classList.add("matched"));
      return matchedSpanIndexes.size > 0;
    }

    function markApproximateAnswerSpan(textLayer, snippetText) {
      const targetTokens = tokenizeForOverlap(snippetText || "");
      if (!targetTokens.length) return false;

      const spans = Array.from(textLayer.querySelectorAll("span"));
      const spanData = spans.map((sp, index) => {
        const rawText = sp.textContent || "";
        const normalized = normalizeWithMap(rawText).normalized;
        const tokens = tokenizeForOverlap(rawText);
        return { index, normalized, tokens };
      }).filter((item) => item.normalized);

      if (!spanData.length) return false;

      const targetSet = new Set(targetTokens);
      let best = null;
      let bestScore = 0;
      const maxWindow = Math.min(14, spanData.length);

      for (let start = 0; start < spanData.length; start += 1) {
        const windowTokens = new Set();

        for (let width = 1; width <= maxWindow && start + width <= spanData.length; width += 1) {
          const item = spanData[start + width - 1];
          item.tokens.forEach((token) => windowTokens.add(token));
          if (!windowTokens.size) continue;

          let overlap = 0;
          targetSet.forEach((token) => {
            if (windowTokens.has(token)) overlap += 1;
          });
          if (!overlap) continue;

          const recall = overlap / targetSet.size;
          const precision = overlap / windowTokens.size;
          const score = (recall * 0.8) + (precision * 0.2);

          if (score > bestScore) {
            bestScore = score;
            best = { start, end: start + width - 1 };
          }
        }
      }

      if (!best || bestScore < 0.42) return false;

      for (let i = best.start; i <= best.end; i += 1) {
        spans[spanData[i].index]?.classList.add("matched");
      }
      return true;
    }

    function markHighlightCandidates(textLayer, candidates) {
      const items = uniqueNonEmpty(candidates);
      for (const candidate of items) {
        if (markExactAnswerSpan(textLayer, candidate)) return true;
      }
      for (const candidate of items) {
        if (markApproximateAnswerSpan(textLayer, candidate)) return true;
      }
      return false;
    }

    async function resolveBestPage(source) {
      const cacheKey = `${source.document}::${source.chunk_text || ""}`;
      if (chunkPageCache.has(cacheKey)) {
        return chunkPageCache.get(cacheKey);
      }

      try {
        const res = await fetch(`${API}/documents/${encodeURIComponent(source.document)}/chunks`);
        const data = await res.json();
        const chunks = data.chunks || [];

        let page = Number(source.page) || 1;
        if (source.chunk_text) {
          const exact = chunks.find((c) => c.text === source.chunk_text);
          if (exact && exact.page_num) {
            page = Number(exact.page_num);
          }
        }

        chunkPageCache.set(cacheKey, page);
        return page;
      } catch {
        return Number(source.page) || 1;
      }
    }

    async function renderPdfWithHighlight(source, pageToOpen) {
      const title = document.getElementById("drawerTitle");
      const sub = document.getElementById("drawerSub");
      const canvas = document.getElementById("pdfCanvas");
      const textLayer = document.getElementById("textLayer");
      const wrap = document.getElementById("pdfWrap");
      const fallback = document.getElementById("fallbackBox");

      title.textContent = `${source.document} - Sayfa ${pageToOpen}`;
      sub.textContent = `${source.section || "Bolum"} | Kaynak metin PDF uzerinde vurgulaniyor`;

      fallback.classList.add("hidden");
      fallback.innerHTML = "";
      canvas.width = 0;
      canvas.height = 0;
      textLayer.innerHTML = "";

      const fileUrl = `${API}/documents/${encodeURIComponent(source.document)}/file`;

      const loadingTask = pdfjsLib.getDocument(fileUrl);
      const pdf = await loadingTask.promise;
      const pageNum = Math.max(1, Math.min(pageToOpen || 1, pdf.numPages));
      const page = await pdf.getPage(pageNum);

      const baseViewport = page.getViewport({ scale: 1.0 });
      const targetWidth = Math.max(320, wrap.clientWidth - 2);
      const scale = targetWidth / baseViewport.width;
      const viewport = page.getViewport({ scale });

      const ctx = canvas.getContext("2d");
      canvas.width = Math.floor(viewport.width);
      canvas.height = Math.floor(viewport.height);
      canvas.style.width = `${Math.floor(viewport.width)}px`;
      canvas.style.height = `${Math.floor(viewport.height)}px`;

      textLayer.style.width = `${Math.floor(viewport.width)}px`;
      textLayer.style.height = `${Math.floor(viewport.height)}px`;

      await page.render({ canvasContext: ctx, viewport }).promise;

      const textContent = await page.getTextContent();
      textLayer.innerHTML = "";

      const textDivs = [];
      await pdfjsLib.renderTextLayer({
        textContent,
        container: textLayer,
        viewport,
        textDivs,
      }).promise;

      markHighlightCandidates(
        textLayer,
        source.highlight_candidates || [source.highlight_text || source.chunk_text || ""]
      );
    }

    async function showFallback(source, pageToOpen) {
      const fallback = document.getElementById("fallbackBox");
      const canvas = document.getElementById("pdfCanvas");
      const textLayer = document.getElementById("textLayer");

      canvas.width = 0;
      canvas.height = 0;
      textLayer.innerHTML = "";

      const firstHighlight = uniqueNonEmpty(
        source.highlight_candidates || [source.highlight_text || source.chunk_text || ""]
      )[0] || "";
      const chunkParam = encodeURIComponent(firstHighlight);
      const pageUrl = `${API}/documents/${encodeURIComponent(source.document)}/page/${pageToOpen}?chunk_text=${chunkParam}`;
      const res = await fetch(pageUrl);
      const data = await res.json();

      fallback.classList.remove("hidden");
      fallback.innerHTML = `
        <strong>PDF gosterimi kullanilamadi.</strong><br>
        Bu nedenle fallback gorunumu acildi.<br><br>
        ${data.has_image && data.image_b64 ? `<img style="max-width:100%;border:1px solid #d1d5db;border-radius:8px" src="data:image/png;base64,${data.image_b64}" alt="Sayfa">` : ""}
        <div style="margin-top:10px">${data.highlighted_html || "(metin bulunamadi)"}</div>
      `;
    }

    function findBestSourceForCitation(citation, sources) {
      if (Number.isInteger(citation?.source_index) && citation.source_index >= 0) {
        return sources[citation.source_index] || null;
      }
      const docKey = String(citation.doc || "").trim().toLocaleLowerCase("tr-TR");
      const page = Number(citation.page) || 1;
      const candidates = (sources || []).filter((source) => {
        return (
          String(source.document || "").trim().toLocaleLowerCase("tr-TR") === docKey &&
          (Number(source.page) || 1) === page
        );
      });

      if (!candidates.length) return null;
      if (candidates.length === 1) return candidates[0];

      let best = candidates[0];
      let bestScore = -1;
      candidates.forEach((source) => {
        const snippet = source.highlight_text || source.chunk_text || "";
        const score = overlapScore(citation.context, snippet);
        if (score > bestScore) {
          best = source;
          bestScore = score;
        }
      });
      return best;
    }

    function findCitationForSourceIndex(sourceIndex) {
      return (lastCitations || []).find((citation) => citation.source_index === sourceIndex) || null;
    }

    async function showCitationOnDocument(citation, sources = []) {
      const source = findBestSourceForCitation(citation, sources);
      if (source) {
        const citationSource = {
          ...source,
          highlight_candidates: uniqueNonEmpty([
            citation.answer_text,
            citation.context,
            citation.evidence_text,
            source.highlight_text,
            source.chunk_text,
          ]),
          highlight_text: citation.answer_text || citation.evidence_text || source.highlight_text || source.chunk_text || "",
        };
        openDrawer();
        const pageToOpen = await resolveBestPage(citationSource);
        try {
          await renderPdfWithHighlight(citationSource, pageToOpen);
        } catch {
          await showFallback(citationSource, pageToOpen);
        }
        return;
      }

      const docId = citation?.doc || "";
      const page = Number(citation?.page) || 1;
      if (!docId) return;
      openDrawer();
      const fallbackSource = {
        document: docId,
        page,
        section: "Alinti",
        chunk_text: "",
      };

      try {
        await renderPdfWithHighlight(fallbackSource, fallbackSource.page);
      } catch {
        await showFallback(fallbackSource, fallbackSource.page);
      }
    }

    async function showAnswerOnDocument(idx) {
      const source = lastSources[idx];
      if (!source) return;
      const citation = findCitationForSourceIndex(idx);
      const answerSource = {
        ...source,
        highlight_candidates: uniqueNonEmpty([
          citation?.answer_text,
          citation?.context,
          citation?.evidence_text,
          source.highlight_text,
          source.chunk_text,
        ]),
        highlight_text: citation?.answer_text || citation?.evidence_text || source.highlight_text || source.chunk_text || "",
      };
      openDrawer();
      const pageToOpen = await resolveBestPage(answerSource);

      try {
        await renderPdfWithHighlight(answerSource, pageToOpen);
      } catch {
        await showFallback(answerSource, pageToOpen);
      }
    }

    document.getElementById("query").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    document.getElementById("fileInput").addEventListener("change", async function () {
      const files = [...this.files];
      this.value = "";

      for (const file of files) {
        const fd = new FormData();
        fd.append("file", file);
        showToast(`Yukleniyor: ${file.name}`);

        try {
          const res = await fetch(`${API}/documents/ingest`, { method: "POST", body: fd });
          const data = await res.json();

          if (res.ok) {
            showToast(`Tamamlandi: ${file.name} | text=${data.text_chunks}, visual=${data.visual_chunks}, relatives=${data.relatives}`);
          } else {
            showToast(`Hata: ${file.name} | ${data.detail || "bilinmeyen hata"}`);
          }
        } catch {
          showToast(`Hata: ${file.name} yuklenemedi.`);
        }
      }
    });
  </script>
