<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IK Bilgi Asistani</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d1d5db;
      --primary: #2563eb;
      --primary-strong: #1d4ed8;
      --soft: #eff6ff;
      --radius: 12px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      height: 60px;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      z-index: 20;
    }

    .title { font-weight: 700; font-size: 16px; }
    .subtitle { font-size: 12px; color: var(--muted); }
    .spacer { flex: 1; }

    .btn, .link-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      font-family: inherit;
    }

    .btn.primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .btn.primary:hover { background: var(--primary-strong); }

    .app {
      position: relative;
      flex: 1;
      min-height: 0;
    }

    .layout {
      height: 100%;
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 78%;
      padding: 10px 12px;
      border-radius: 10px;
      line-height: 1.5;
      border: 1px solid var(--line);
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .msg.bot { align-self: flex-start; background: #fff; }

    .sources {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .src-chip {
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--primary-strong);
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      cursor: pointer;
    }

    .inline-cite {
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 6px;
      padding: 1px 6px;
      font-size: 12px;
      cursor: pointer;
      margin: 0 2px;
    }

    .input-row {
      border-top: 1px solid var(--line);
      padding: 12px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    textarea {
      width: 100%;
      min-height: 42px;
      max-height: 140px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font-family: inherit;
      font-size: 14px;
    }

    #toast {
      position: fixed;
      bottom: 14px;
      right: 14px;
      background: #111827;
      color: #fff;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      display: none;
      max-width: 460px;
      z-index: 1200;
    }

    .drawer {
      position: absolute;
      top: 0;
      right: 0;
      height: 100%;
      width: min(760px, 100%);
      background: #fff;
      border-left: 1px solid var(--line);
      box-shadow: -10px 0 30px rgba(0,0,0,0.12);
      transform: translateX(102%);
      transition: transform 320ms cubic-bezier(.2,.8,.2,1);
      z-index: 1000;
      display: flex;
      flex-direction: column;
    }

    .drawer.open { transform: translateX(0); }

    .drawer-header {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-height: 56px;
    }

    .drawer-title { font-size: 13px; font-weight: 700; }
    .drawer-sub { font-size: 12px; color: var(--muted); }

    .drawer-body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 12px;
      background: #f8fafc;
    }

    .pdf-wrap {
      position: relative;
      width: 100%;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      overflow: hidden;
    }

    #pdfCanvas {
      display: block;
      width: 100%;
      height: auto;
    }

    #textLayer {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      overflow: hidden;
      line-height: 1;
      text-size-adjust: none;
      transform-origin: 0 0;
    }

    #textLayer span {
      color: transparent;
      position: absolute;
      white-space: pre;
      cursor: text;
      transform-origin: 0% 0%;
      pointer-events: none;
    }

    #textLayer span.matched {
      background: rgba(253, 230, 138, 0.75);
      border-radius: 3px;
      color: transparent;
    }

    .fallback {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 10px;
      font-size: 13px;
      line-height: 1.6;
    }

    .hidden { display: none; }

    @media (max-width: 900px) {
      .msg { max-width: 92%; }
      .drawer { width: 100%; }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
  <header>
    <div>
      <div class="title">IK Bilgi Asistani</div>
      <div class="subtitle">Kaynaklara dayali chat</div>
    </div>
    <div class="spacer"></div>
    <a class="link-btn" href="/static/chunks.html">Chunk Detaylari</a>
    <button class="btn" onclick="document.getElementById('fileInput').click()">Dokuman Yukle</button>
    <input id="fileInput" type="file" accept=".pdf,.doc,.docx" multiple style="display:none" />
  </header>

  <div class="app">
    <main class="layout">
      <section class="card">
        <div id="messages">
          <div class="msg bot">Merhaba. Dokuman yukleyip soru sorabilirsiniz.</div>
        </div>
        <div class="input-row">
          <textarea id="query" placeholder="Sorunuzu yazin..."></textarea>
          <button id="sendBtn" class="btn primary" onclick="sendMessage()">Gonder</button>
        </div>
      </section>
    </main>

    <aside id="pdfDrawer" class="drawer" aria-hidden="true">
      <div class="drawer-header">
        <div>
          <div id="drawerTitle" class="drawer-title">Dokuman Gosterimi</div>
          <div id="drawerSub" class="drawer-sub">Kaynak seciniz</div>
        </div>
        <div class="spacer"></div>
        <button class="btn" onclick="closeDrawer()">Kapat</button>
      </div>

      <div class="drawer-body">
        <div class="pdf-wrap" id="pdfWrap">
          <canvas id="pdfCanvas"></canvas>
          <div id="textLayer"></div>
        </div>

        <div id="fallbackBox" class="fallback hidden"></div>
      </div>
    </aside>
  </div>

  <div id="toast"></div>

  <script>
    const API = "";
    let history = [];
    let lastSources = [];
    const chunkPageCache = new Map();

    if (window.pdfjsLib) {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    }

    function showToast(msg) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.style.display = "block";
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => { el.style.display = "none"; }, 3500);
    }

    function escapeHtml(s) {
      return (s || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function openDrawer() {
      const drawer = document.getElementById("pdfDrawer");
      drawer.classList.add("open");
      drawer.setAttribute("aria-hidden", "false");
    }

    function closeDrawer() {
      const drawer = document.getElementById("pdfDrawer");
      drawer.classList.remove("open");
      drawer.setAttribute("aria-hidden", "true");
    }

    function addMessage(role, text, sources = []) {
      const wrap = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.innerHTML = role === "bot" ? renderBotTextWithCitations(text) : escapeHtml(text).replace(/\n/g, "<br>");

      if (sources.length) {
        const src = document.createElement("div");
        src.className = "sources";
        sources.forEach((s, i) => {
          const chip = document.createElement("button");
          chip.className = "src-chip";
          chip.textContent = `${s.document} s.${s.page}`;
          chip.onclick = () => showAnswerOnDocument(i);
          src.appendChild(chip);
        });
        div.appendChild(src);
      }

      wrap.appendChild(div);

      if (role === "bot") {
        div.querySelectorAll(".inline-cite").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const doc = decodeURIComponent(btn.getAttribute("data-doc") || "");
            const page = Number(btn.getAttribute("data-page") || "1");
            await showCitationOnDocument(doc, page);
          });
        });
      }

      wrap.scrollTop = wrap.scrollHeight;
    }

    function renderBotTextWithCitations(text) {
      const raw = text || "";
      const re = /\[([^,\]]+),\s*s\.(\d+)\]/g;
      let out = "";
      let last = 0;
      let m;

      while ((m = re.exec(raw)) !== null) {
        const before = raw.slice(last, m.index);
        const doc = (m[1] || "").trim();
        const page = Number(m[2] || "1");
        const docAttr = encodeURIComponent(doc);

        out += escapeHtml(before).replace(/\n/g, "<br>");
        out += `<button class="inline-cite" data-doc="${docAttr}" data-page="${page}">[${escapeHtml(doc)}, s.${page}]</button>`;
        last = re.lastIndex;
      }

      out += escapeHtml(raw.slice(last)).replace(/\n/g, "<br>");
      return out;
    }

    async function sendMessage() {
      const queryEl = document.getElementById("query");
      const sendBtn = document.getElementById("sendBtn");
      const query = queryEl.value.trim();
      if (!query) return;

      addMessage("user", query);
      queryEl.value = "";
      sendBtn.disabled = true;

      try {
        const res = await fetch(`${API}/chat/`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query, history }),
        });

        const data = await res.json();
        const answer = data.answer || "Yanit alinamadi.";
        const sources = data.sources || [];

        history.push({ role: "user", content: query });
        history.push({ role: "assistant", content: answer });
        if (history.length > 20) history = history.slice(-20);

        lastSources = sources;
        addMessage("bot", answer, sources);
        if (sources.length) {
          showAnswerOnDocument(0);
        }
      } catch {
        addMessage("bot", "Sunucuya baglanirken hata olustu.");
      } finally {
        sendBtn.disabled = false;
      }
    }

    function buildTokenSet(chunkText) {
      const words = (chunkText || "")
        .toLowerCase()
        .replace(/[^\p{L}\p{N}\s]/gu, " ")
        .split(/\s+/)
        .filter(w => w.length >= 4);
      return Array.from(new Set(words)).slice(0, 60);
    }

    function markLikelyAnswerSpans(textLayer, chunkText) {
      const tokens = buildTokenSet(chunkText);
      if (!tokens.length) return;

      const spans = textLayer.querySelectorAll("span");
      spans.forEach((sp) => {
        const t = (sp.textContent || "").toLowerCase();
        if (!t) return;

        let hits = 0;
        for (const tok of tokens) {
          if (t.includes(tok)) {
            hits += 1;
            if (hits >= 1) break;
          }
        }
        if (hits > 0) {
          sp.classList.add("matched");
        }
      });
    }

    async function resolveBestPage(source) {
      const cacheKey = `${source.document}::${source.chunk_text || ""}`;
      if (chunkPageCache.has(cacheKey)) {
        return chunkPageCache.get(cacheKey);
      }

      try {
        const res = await fetch(`${API}/documents/${encodeURIComponent(source.document)}/chunks`);
        const data = await res.json();
        const chunks = data.chunks || [];

        let page = Number(source.page) || 1;
        if (source.chunk_text) {
          const exact = chunks.find((c) => c.text === source.chunk_text);
          if (exact && exact.page_num) {
            page = Number(exact.page_num);
          }
        }

        chunkPageCache.set(cacheKey, page);
        return page;
      } catch {
        return Number(source.page) || 1;
      }
    }

    async function renderPdfWithHighlight(source, pageToOpen) {
      const title = document.getElementById("drawerTitle");
      const sub = document.getElementById("drawerSub");
      const canvas = document.getElementById("pdfCanvas");
      const textLayer = document.getElementById("textLayer");
      const wrap = document.getElementById("pdfWrap");
      const fallback = document.getElementById("fallbackBox");

      title.textContent = `${source.document} - Sayfa ${pageToOpen}`;
      sub.textContent = `${source.section || "Bolum"} | Kaynak metin PDF uzerinde vurgulaniyor`;

      fallback.classList.add("hidden");
      fallback.innerHTML = "";
      canvas.width = 0;
      canvas.height = 0;
      textLayer.innerHTML = "";

      const fileUrl = `${API}/documents/${encodeURIComponent(source.document)}/file`;

      const loadingTask = pdfjsLib.getDocument(fileUrl);
      const pdf = await loadingTask.promise;
      const pageNum = Math.max(1, Math.min(pageToOpen || 1, pdf.numPages));
      const page = await pdf.getPage(pageNum);

      const baseViewport = page.getViewport({ scale: 1.0 });
      const targetWidth = Math.max(320, wrap.clientWidth - 2);
      const scale = targetWidth / baseViewport.width;
      const viewport = page.getViewport({ scale });

      const ctx = canvas.getContext("2d");
      canvas.width = Math.floor(viewport.width);
      canvas.height = Math.floor(viewport.height);
      canvas.style.width = `${Math.floor(viewport.width)}px`;
      canvas.style.height = `${Math.floor(viewport.height)}px`;

      textLayer.style.width = `${Math.floor(viewport.width)}px`;
      textLayer.style.height = `${Math.floor(viewport.height)}px`;

      await page.render({ canvasContext: ctx, viewport }).promise;

      const textContent = await page.getTextContent();
      textLayer.innerHTML = "";

      const textDivs = [];
      await pdfjsLib.renderTextLayer({
        textContent,
        container: textLayer,
        viewport,
        textDivs,
      }).promise;

      markLikelyAnswerSpans(textLayer, source.chunk_text || "");
    }

    async function showFallback(source, pageToOpen) {
      const fallback = document.getElementById("fallbackBox");
      const canvas = document.getElementById("pdfCanvas");
      const textLayer = document.getElementById("textLayer");

      canvas.width = 0;
      canvas.height = 0;
      textLayer.innerHTML = "";

      const chunkParam = encodeURIComponent(source.chunk_text || "");
      const pageUrl = `${API}/documents/${encodeURIComponent(source.document)}/page/${pageToOpen}?chunk_text=${chunkParam}`;
      const res = await fetch(pageUrl);
      const data = await res.json();

      fallback.classList.remove("hidden");
      fallback.innerHTML = `
        <strong>PDF gosterimi kullanilamadi.</strong><br>
        Bu nedenle fallback gorunumu acildi.<br><br>
        ${data.has_image && data.image_b64 ? `<img style="max-width:100%;border:1px solid #d1d5db;border-radius:8px" src="data:image/png;base64,${data.image_b64}" alt="Sayfa">` : ""}
        <div style="margin-top:10px">${data.highlighted_html || "(metin bulunamadi)"}</div>
      `;
    }

    async function showCitationOnDocument(docId, page) {
      if (!docId) return;
      openDrawer();
      const source = {
        document: docId,
        page: Number(page) || 1,
        section: "Alinti",
        chunk_text: "",
      };

      try {
        await renderPdfWithHighlight(source, source.page);
      } catch {
        await showFallback(source, source.page);
      }
    }

    async function showAnswerOnDocument(idx) {
      const source = lastSources[idx];
      if (!source) return;
      openDrawer();
      const pageToOpen = await resolveBestPage(source);

      try {
        await renderPdfWithHighlight(source, pageToOpen);
      } catch {
        await showFallback(source, pageToOpen);
      }
    }

    document.getElementById("query").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    document.getElementById("fileInput").addEventListener("change", async function () {
      const files = [...this.files];
      this.value = "";

      for (const file of files) {
        const fd = new FormData();
        fd.append("file", file);
        showToast(`Yukleniyor: ${file.name}`);

        try {
          const res = await fetch(`${API}/documents/ingest`, { method: "POST", body: fd });
          const data = await res.json();

          if (res.ok) {
            showToast(`Tamamlandi: ${file.name} | text=${data.text_chunks}, visual=${data.visual_chunks}, relatives=${data.relatives}`);
          } else {
            showToast(`Hata: ${file.name} | ${data.detail || "bilinmeyen hata"}`);
          }
        } catch {
          showToast(`Hata: ${file.name} yuklenemedi.`);
        }
      }
    });
  </script>
</body>
</html>
